<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Provas</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<div class="container">

    <header>
        <h1>Simulador Online</h1>
        <p>Importe seu CSV e sua pasta de imagens</p>
    </header>

    <section id="start-screen" class="card">

        <h2>Importação</h2>

        <label>Arquivo CSV</label>
        <input type="file" id="csvFile" accept=".csv">

        <br><br>

        <label>Pasta de Imagens</label>
        <input
            type="file"
            id="imageFolder"
            webkitdirectory
            directory
            multiple>

        <br><br>

        <label>
            Quantidade de questões:
        </label>

        <input
            type="number"
            id="questionLimit"
            value="50">

        <br><br>

        <label>
            <input
                type="checkbox"
                id="shuffleQuestions"
                checked>
            Embaralhar questões
        </label>

        <br><br>

        <button id="startBtn">
            Iniciar Simulado
        </button>

    </section>

    <section id="quiz-screen" class="hidden">

        <div class="top-bar">

            <div>
                Questão
                <span id="questionNumber"></span>
                /
                <span id="totalQuestions"></span>
            </div>

            <div id="timer">
                00:00
            </div>

        </div>

        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>

        <div class="card">

            <h2 id="questionText"></h2>

            <img
                id="questionImage"
                class="question-image hidden">

            <div id="optionsContainer"></div>

            <div class="navigation">

                <button id="prevBtn">
                    Anterior
                </button>

                <button id="nextBtn">
                    Próxima
                </button>

            </div>

        </div>

    </section>

    <section id="result-screen" class="hidden">

        <div class="card">

            <h2>Resultado Final</h2>

            <h3>
                Acertos:
                <span id="correctCount"></span>
            </h3>

            <h3>
                Erros:
                <span id="wrongCount"></span>
            </h3>

            <h3>
                Aproveitamento:
                <span id="scorePercent"></span>
            </h3>

            <br>

            <div id="reviewContainer"></div>

        </div>

    </section>

</div>

<script src="app.js"></script>

</body>
</html>
