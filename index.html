<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Online</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
<div class="container">
<header><h1>Simulador Online</h1><p>Sistema de Testes e Certificações</p></header>

<section id="start-screen" class="card">
<h2>Importação de Questões</h2>
<input type="file" id="csvFile" accept=".csv">
<input type="file" id="imageFolder" webkitdirectory directory multiple>
<input type="number" id="questionLimit" value="50" min="1">
<label><input type="checkbox" id="shuffleQuestions" checked> Embaralhar Questões</label>
<button id="startBtn">Iniciar Simulado</button>
</section>

<section id="quiz-screen" class="hidden">
<div class="top-bar">
<div>Questão <span id="questionNumber"></span>/<span id="totalQuestions"></span></div>
<div id="timer">00:00</div>
</div>
<div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>

<div class="card">
<div id="questionCategory" class="category-badge hidden"></div>
<h2 id="questionText"></h2>
<img id="questionImage" class="question-image hidden">
<div id="multipleAlert" class="multiple-alert hidden">Esta questão possui mais de uma resposta correta.</div>
<div id="optionsContainer"></div>
<div class="navigation">
<button id="prevBtn">Anterior</button>
<button id="nextBtn">Próxima</button>
</div>
</div>
</section>

<section id="result-screen" class="hidden">
<div class="card">
<h2>Resultado Final</h2>
<div class="stats">
<div class="stat success"><h3 id="correctCount">0</h3><p>Acertos</p></div>
<div class="stat error"><h3 id="wrongCount">0</h3><p>Erros</p></div>
<div class="stat info"><h3 id="scorePercent">0%</h3><p>Desempenho</p></div>
</div>
<button id="showOnlyErrors">Mostrar Apenas Erros</button>
<button id="showAllReview">Mostrar Tudo</button>
<div id="reviewContainer"></div>
<button onclick="location.reload()">Novo Simulado</button>
</div>
</section>
</div>

<div id="imageModal" class="image-modal"><img id="modalImage"></div>
<script src="app.js"></script>
</body>
</html>
